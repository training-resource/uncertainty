project:
  type: book

book:
  title: "Uncertainty Metrics for Forest Carbon Reporting"
  author: 
    - name: Winrock International
      url: https://winrock.org/program-areas/environment-and-climate/ecosystem-services/
    - name: Dr Julie Nash
      url: https://winrock.org/program-areas/environment-and-climate/ecosystem-services/
      email: julie.nash@winrock.org
    - name: Dr Seamus Murphy
      url: https://scholar.google.com/citations?hl=en&user=jDGq9I4AAAAJ
      orcid: 0000-0002-1792-0351 
      email: seamusrobertmurphy@gmail.com
    - name: Nicole Scotti
      url: https://winrock.org/program-areas/environment-and-climate/ecosystem-services/
      email: nicole.scotti@winrock.org
      date: 2025/10/30
  open-graph: true 
  page-footer:
    left: "[Source](https://github.com/training-resource/uncertainty)"
  repo-url: https://github.com/training-resource/uncertainty
  repo-branch: main
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - 01-allometry/index.qmd
    - 02-emission-factors/index.qmd
    - 03-activity-data/index.qmd
    - 04-monte-carlo/index.qmd

  appendices:
    - references/index.qmd
    - AA-Appendix/glossary-terms.qmd
    - AA-Appendix/additional-reading.qmd

bibliography: references/references.bib
csl: references/apa.csl
citeproc: true  

filters:
  - quarto

sidebar:
    title: "Uncertainty Stats"
    search: true
    style: "docked"
    collapse-level: 4

format:
  docx:
    #reference-doc: ./references/style.docx
    toc: false
    toc-location: right
    toc-depth: 3
    toc-title: "**On this page**"
    number-sections: false
    embed-resources: false
    highlight-style: github
    theme: 
      - styles.scss
      - default
    code-fold: false
    code-summary: "Code"
    code-tools: true
    code-link: true
    title-block-style: plain
    knitr:
      opts_chunk:
        out.width: 100%
        R.options:
          width: 60

engine: knitr

knitr:
  opts_chunk: 
    collapse: true
    comment: "#" 
    R.options:
      knitr.graphics.auto_pdf: true
      dplyr.print_min: 6
      dplyr.print_max: 6
      stars.crs: 17
      digits: 3
